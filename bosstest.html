<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0;background:#2a3a28}canvas{image-rendering:pixelated}</style></head>
<body><canvas id="c" width="640" height="360"></canvas>
<script type="module">
import { buildBoss, bossFrame } from "./js/boss.js";
buildBoss();
const ctx=document.getElementById("c").getContext("2d"); ctx.imageSmoothingEnabled=false;
let f=0;
function draw(){
  ctx.clearRect(0,0,640,360);
  ctx.fillStyle="#fff";ctx.font="12px sans-serif";
  ctx.fillText("NORMAL",80,30); ctx.fillText("RAGE (low HP)",360,30);
  const n=bossFrame(f,false), r=bossFrame(f,true);
  ctx.drawImage(n, 40,40, 240,240);
  ctx.drawImage(r, 340,40, 240,240);
  f++;
}
setInterval(draw,180);draw();
window.__READY__=true;
</script></body></html>
