<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Anasta Chronicle</title>
<link rel="stylesheet" href="css/style.css" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
<div id="boot">
  <div class="boot-card">
    <p class="boot-kicker">CHRONICLE OF THE WILDS</p>
    <h1>ANASTA</h1>
    <p class="boot-sub">Explore · Tame · Survive</p>
    <div id="boot-status">Loading…</div>
    <button id="btn-start" disabled>Enter the Forest</button>
    <div class="boot-credit">Creatures & tiles: Tuxemon (CC-BY-SA 4.0)</div>
  </div>
</div>

<div id="game-wrap" class="hidden">
  <canvas id="game" width="420" height="236"></canvas>

  <div id="hud">
    <div id="status-card">
      <div class="status-row"><span class="status-name">Traveler</span><span class="status-lvl" id="xp-text">LV 1</span></div>
      <div class="bar-row"><span class="bar-label">HP</span><div class="bar hp"><div class="bar-fill" id="hp-fill"></div></div><span class="bar-val" id="hp-text">50</span></div>
      <div class="bar-row"><span class="bar-label">SP</span><div class="bar sp"><div class="bar-fill" id="stamina-fill"></div></div><span class="bar-val" id="stamina-text">100</span></div>
      <div class="bar-row xp-row"><div class="bar xp"><div class="bar-fill" id="xp-fill"></div></div></div>
      <div class="clock-row"><span id="clock">Day · 06:00</span><span id="pet-chip" class="hidden">Pet: —</span></div>
    </div>

    <div id="minimap-wrap"><canvas id="minimap" width="120" height="120"></canvas></div>

    <div id="skillbar">
      <button class="sk" data-i="0"><span class="sk-key">1</span><span class="sk-name">Strike</span><div class="sk-cd" id="cd0"></div></button>
      <button class="sk" data-i="1"><span class="sk-key">2</span><span class="sk-name">Heal</span><div class="sk-cd" id="cd1"></div></button>
      <button class="sk" data-i="2"><span class="sk-key">3</span><span class="sk-name">Whirl</span><div class="sk-cd" id="cd2"></div></button>
      <button class="sk" data-i="3"><span class="sk-key">4</span><span class="sk-name">Dash</span><div class="sk-cd" id="cd3"></div></button>
      <div class="sk-div"></div>
      <button class="sk sk-util" id="btn-inv-hot"><span class="sk-key">I</span><span class="sk-name">Bag</span></button>
      <button class="sk sk-util" id="btn-craft-hot"><span class="sk-key">C</span><span class="sk-name">Forge</span></button>
      <button class="sk sk-util" id="btn-move-mode"><span class="sk-key">M</span><span class="sk-name">Tap</span></button>
    </div>

    <div id="toast"></div>
    <div id="dmg-layer"></div>
    <div id="interact-prompt" class="hidden"><kbd>F</kbd> <span id="interact-label">Open</span></div>

    <div id="touch-ui">
      <div id="stick"><div id="stick-knob"></div></div>
      <div id="touch-btns">
        <button id="btn-attack" class="tbtn atk">ATK</button>
        <button id="btn-shield" class="tbtn shd">GRD</button>
        <button id="btn-evade" class="tbtn evd">DASH</button>
      </div>
    </div>
  </div>

  <div id="panel-inv" class="panel hidden">
    <div class="panel-head"><h2>Inventory</h2><button class="panel-close" data-close="inv">×</button></div>
    <div id="inv-grid"></div>
    <div class="panel-foot"><span>Gold <b id="gold-text">0</b></span><span>Weapon <b id="eq-text">—</b></span></div>
  </div>
  <div id="panel-craft" class="panel hidden">
    <div class="panel-head"><h2>Forge</h2><button class="panel-close" data-close="craft">×</button></div>
    <div id="craft-list"></div>
  </div>
  <div id="panel-level" class="panel hidden modal"><h2>Level Up</h2><p id="level-msg"></p><button id="btn-level-ok">Continue</button></div>
  <div id="panel-pet" class="panel hidden modal"><h2>A wild friend!</h2><img id="pet-img" width="96" height="96" style="image-rendering:pixelated;margin:0 auto;display:block"/><p id="pet-msg"></p><button id="btn-pet-ok">Adopt</button></div>
  <div id="death-screen" class="panel hidden modal"><h2>Fallen</h2><p>The forest claims another traveler.</p><button id="btn-respawn">Respawn at Camp</button></div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
